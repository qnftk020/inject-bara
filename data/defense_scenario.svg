<svg width="100%" viewBox="0 0 680 590" role="img" xmlns="http://www.w3.org/2000/svg">
<title>InjectScan defense scenario — three attacks, three different layers catch them</title>
<desc>Three attack types enter the system at the top. Each follows a vertical lane down through three detection layers. Attack A is caught at Layer 1, Attack B passes Layer 1 but is caught at Layer 2, Attack C passes Layers 1 and 2 and is caught at Layer 3. No attack reaches the output, demonstrating defense in depth.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<text x="340" y="28" text-anchor="middle" style="fill:rgb(20, 20, 19); font-family: sans-serif; font-size:14px; font-weight:500;">Defense scenario — each attack caught at a different layer</text>
<g>
<rect x="125" y="50" width="150" height="60" rx="8" stroke="#5f5e5a" stroke-width="0.5" stroke-dasharray="4 4" fill="none"/>
<text x="200" y="76" text-anchor="middle" style="fill:rgb(68, 68, 65); font-family: sans-serif; font-size:14px; font-weight:500;">Attack A</text>
<text x="200" y="96" text-anchor="middle" style="fill:rgb(95, 94, 90); font-family: sans-serif; font-size:12px;">Visual concealment</text>
</g>
<g>
<rect x="325" y="50" width="150" height="60" rx="8" stroke="#5f5e5a" stroke-width="0.5" stroke-dasharray="4 4" fill="none"/>
<text x="400" y="76" text-anchor="middle" style="fill:rgb(68, 68, 65); font-family: sans-serif; font-size:14px; font-weight:500;">Attack B</text>
<text x="400" y="96" text-anchor="middle" style="fill:rgb(95, 94, 90); font-family: sans-serif; font-size:12px;">Imperative vocab</text>
</g>
<g>
<rect x="525" y="50" width="150" height="60" rx="8" stroke="#5f5e5a" stroke-width="0.5" stroke-dasharray="4 4" fill="none"/>
<text x="600" y="76" text-anchor="middle" style="fill:rgb(68, 68, 65); font-family: sans-serif; font-size:14px; font-weight:500;">Attack C</text>
<text x="600" y="96" text-anchor="middle" style="fill:rgb(95, 94, 90); font-family: sans-serif; font-size:12px;">Novel variant</text>
</g>
<line x1="200" y1="110" x2="200" y2="210" stroke="#141413" stroke-width="1.8"/>
<line x1="400" y1="110" x2="400" y2="330" stroke="#141413" stroke-width="1.2" stroke-dasharray="6 5"/>
<line x1="600" y1="110" x2="600" y2="450" stroke="#141413" stroke-width="1" stroke-dasharray="2 4"/>
<rect x="15" y="170" width="650" height="80" rx="8" fill="#f5f4ed" stroke="rgba(31, 30, 29, 0.3)" stroke-width="0.5"/>
<text x="72" y="197" text-anchor="middle" style="fill:#141413; font-family: sans-serif; font-size:14px; font-weight:500;">Layer 1</text>
<text x="72" y="222" text-anchor="middle" style="fill:#3d3d3a; font-family: sans-serif; font-size:12px;">Static scan</text>
<circle cx="200" cy="210" r="11" fill="#141413"/>
<text x="200" y="237" text-anchor="middle" style="fill:#3d3d3a; font-family: sans-serif; font-size:12px;">Caught</text>
<rect x="15" y="290" width="650" height="80" rx="8" fill="#f5f4ed" stroke="rgba(31, 30, 29, 0.3)" stroke-width="0.5"/>
<text x="72" y="317" text-anchor="middle" style="fill:#141413; font-family: sans-serif; font-size:14px; font-weight:500;">Layer 2</text>
<text x="72" y="342" text-anchor="middle" style="fill:#3d3d3a; font-family: sans-serif; font-size:12px;">PMI signatures</text>
<circle cx="400" cy="330" r="11" fill="#141413"/>
<text x="400" y="357" text-anchor="middle" style="fill:#3d3d3a; font-family: sans-serif; font-size:12px;">Caught</text>
<rect x="15" y="410" width="650" height="80" rx="8" fill="#f5f4ed" stroke="rgba(31, 30, 29, 0.3)" stroke-width="0.5"/>
<text x="72" y="437" text-anchor="middle" style="fill:#141413; font-family: sans-serif; font-size:14px; font-weight:500;">Layer 3</text>
<text x="72" y="462" text-anchor="middle" style="fill:#3d3d3a; font-family: sans-serif; font-size:12px;">LLM judge</text>
<circle cx="600" cy="450" r="11" fill="#141413"/>
<text x="600" y="477" text-anchor="middle" style="fill:#3d3d3a; font-family: sans-serif; font-size:12px;">Caught</text>
<rect x="15" y="520" width="650" height="50" rx="8" fill="#f5f4ed" stroke="rgba(31, 30, 29, 0.3)" stroke-width="0.5"/>
<text x="340" y="540" text-anchor="middle" style="fill:#141413; font-family: sans-serif; font-size:14px; font-weight:500;">Defense in depth holds</text>
<text x="340" y="558" text-anchor="middle" style="fill:#3d3d3a; font-family: sans-serif; font-size:12px;">Each attack stopped at a different layer — no single point of failure</text>
</svg>
